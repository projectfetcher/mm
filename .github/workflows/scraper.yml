name: Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 6:00 AM UTC
  workflow_dispatch:        # also allows manual trigger from GitHub UI

# This gives the auto-created GITHUB_TOKEN permission to push to the repo.
# Without this, git push returns 403. You don't need to create this secret —
# GitHub creates it automatically for every run.
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # uses the auto token with write access

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python mm.py

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mimu-jobs-${{ github.run_number }}
          path: |
            mimu_jobs.csv
            mimu_jobs.xlsx
          retention-days: 30

      - name: Commit results to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mimu_jobs.csv mimu_jobs.xlsx
          git diff --cached --quiet || git commit -m "chore: update jobs data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
